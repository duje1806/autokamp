<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos | Auto Kamp Pod Maslinom Orašac</title>
    <link rel="icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
</head>
<body style="background: var(--brand-beige);">

    <!-- Luxury Navigation -->
    <nav id="mainNav">
        <a href="index_de.html" class="nav-brand">
            <img src="favicon.ico" alt="Logo">
            POD MASLINOM
        </a>
        <div class="menu-toggle" id="mobileMenu">
            <span></span><span></span><span></span>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index_de.html">Startseite</a></li>
            <li><a href="mapa_de.html">Karte</a></li>
            <li><a href="cjenik_de.html">Preise</a></li>
            <li><a href="galerija_de.html" class="active">Fotos</a></li>
            <li><a href="dojmovi_de.html">Eindrücke</a></li>
            <li><a href="kontakt_de.html">Kontakt</a></li>
        </ul>
        <div class="lang-switch">
             <a href="galerija.html">HR</a>
             <a href="galerija_en.html">EN</a>
             <a href="galerija_de.html" class="active">DE</a>
             <a href="galerija_fr.html">FR</a>
             <a href="galerija_pl.html">PL</a>
             <a href="galerija_it.html">IT</a>
        </div>
    </nav>

    <!-- Header Section -->
    <header class="hero-sub" style="align-items: center; padding-bottom: 0;">
        <div class="hero-img"><img src="images/photo_g.jpg" alt="Fotogalerie"></div>
        <div class="container-wide" style="position: relative; z-index: 10; text-align: center; color: white;">
            <h1>Fotogalerie.</h1>
        </div>
    </header>

    <!-- Main Content Section -->
    <section class="section">
        <div class="container-wide">
            <p class="meta-info">Der Camp-Blick</p>
            <h2 style="font-size: 2.5rem; margin-bottom: 4rem;">Orašac durch das Objektiv unseres Camps.</h2>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px;">
                <div class="img-reveal" style="aspect-ratio: 1/1;"><img src="images/1m.jpg" alt="1"></div>
                <div class="img-reveal" style="aspect-ratio: 16/9; grid-column: span 2;"><img src="images/2m.jpg" alt="2"></div>
                <!-- Simplified for brevity in drafting, but maintaining structure -->
                <div class="img-reveal" style="aspect-ratio: 4/5;"><img src="images/3m.jpg" alt="3"></div>
                <div class="img-reveal" style="aspect-ratio: 1/1;"><img src="images/4m.jpg" alt="4"></div>
                <div class="img-reveal" style="aspect-ratio: 1/1;"><img src="images/5m.jpg" alt="5"></div>
                <div class="img-reveal" style="aspect-ratio: 16/9; grid-column: span 2;"><img src="images/k4.jpg" alt="Camp"></div>
            </div>
        </div>
    </section>

    <!-- Footer Content -->
    <footer>
        <div class="footer-bottom">
            <p class="caps-small">&copy; 2025 Auto-camp Pod maslinom.</p>
        </div>
    </footer>

    <script>
        const mobileMenu = document.getElementById('mobileMenu');
        const navLinks = document.getElementById('navLinks');
        const nav = document.getElementById('mainNav');
        mobileMenu.addEventListener('click', () => { navLinks.classList.toggle('mobile-open'); });
        window.addEventListener('scroll', function() {
            if (window.scrollY > 100) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });
    </script>
</body>
</html>
